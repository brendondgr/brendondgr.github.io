<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brendon DGR's Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/section/css/main.css">
    <style>
        /* Scroll reveal animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Custom scrollbar for project section */
        .horizontal-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .horizontal-scroll::-webkit-scrollbar-track {
            background: #161b22;
            border-radius: 10px;
        }
        .horizontal-scroll::-webkit-scrollbar-thumb {
            background-color: #238636;
            border-radius: 10px;
        }
        .horizontal-scroll::-webkit-scrollbar-thumb:hover {
            background-color: #2ea043;
        }

        /* Particles.js background container styling */
        #particles-js-container {
            position: relative;
            z-index: 1;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Shine effect for interest boxes */
        .interest-box {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .interest-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(88, 166, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }
        .interest-box:hover::before {
            left: 100%;
        }
        .interest-box:hover {
            border-color: #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }

        /* Border animation for Guiding Values */
        .border-animation {
            position: relative;
            overflow: hidden;
        }
        .border-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 0.5rem; 
            padding: 2px; 
            background: linear-gradient(90deg, transparent, #58a6ff, transparent); 
            -webkit-mask: 
               linear-gradient(#fff 0 0) content-box, 
               linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .border-animation:hover::before {
            opacity: 1;
            animation: border-flow 2s linear infinite;
        }
        
        @keyframes border-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
    </style>
</head>
<body class="antialiased">

    <main class="relative min-h-screen flex items-center justify-center overflow-hidden">
         <!-- Background Image and Overlay -->
        <div class="absolute inset-0 z-0 bg-[#0d1117]">
            <img src="images/hero_backdrop.avif" 
                alt="Abstract technology background" 
                class="w-full h-full object-cover opacity-60"
                onerror="this.onerror=null;this.src='https://placehold.co/1920x1080/0d1117/c9d1d9?text=Image+Not+Found';">
            <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-[#0d1117]"></div>
        </div>
        
        <!-- Redirect Content -->
        <div class="relative z-10 max-w-4xl mx-auto px-4 py-12 flex flex-col items-center text-center reveal visible">
            <!-- Profile Picture -->
            <div class="relative w-32 h-32 md:w-40 md:h-40 mb-8">
                <div class="absolute inset-0 border-2 rounded-full accent-border animate-pulse"></div>
                <img src="images/pfp.jpg" alt="Brendon DGR" class="rounded-full w-full h-full object-cover p-2 bg-[#0d1117] shadow-2xl">
            </div>

            <!-- Message -->
            <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-white mb-6">
                I've Moved!
            </h1>
            <p class="text-xl md:text-2xl text-slate-300 mb-10">
                Please visit my new website at 
                <a href="https://brendondgr.com" class="text-sky-400 hover:text-sky-300 underline transition-colors font-mono">brendondgr.com</a>
            </p>

            <!-- CTA Button -->
            <div>
                <a href="https://brendondgr.com" class="inline-block btn-primary font-medium text-lg px-10 py-4 rounded-full shadow-lg hover:shadow-sky-500/20 transition-all duration-300 transform hover:-translate-y-1">
                    Take Me There
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="absolute bottom-0 left-0 w-full bg-transparent">
        <div class="max-w-screen-xl mx-auto py-6 px-4 text-center text-slate-500">
            <p>&copy; 2025 Brendon DGR All Rights Reserved.</p>
        </div>
    </footer>

    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    
    <!-- Main Application Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Particles.js Initialization ---
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#ffffff" },
                    "shape": { "type": "circle", "stroke": { "width": 0, "color": "#000000" } },
                    "opacity": { "value": 0.3, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0, "sync": false } },
                    "size": { "value": 3, "random": true, "anim": { "enable": false } },
                    "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": false }, "resize": true },
                    "modes": {
                        "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } }
                    }
                },
                "retina_detect": true
            });

            // --- Scroll Reveal Animation ---
            const revealElements = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            revealElements.forEach(el => {
                observer.observe(el);
            });
        });
    </script>
    <script src="/section/javascript/navbar-loader.js"></script>
</body>
</html>
